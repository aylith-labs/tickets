name: Release binaries

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: Existing tag to build and attach binaries to
        required: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install --frozen-lockfile

      # Build the web UI first — binary.ts embeds apps/web/dist into the binary.
      - run: bun run build:web

      - name: Compile standalone binaries
        run: |
          mkdir -p dist-bin
          declare -A targets=(
            [linux-x64]=bun-linux-x64
            [linux-arm64]=bun-linux-arm64
            [darwin-x64]=bun-darwin-x64
            [darwin-arm64]=bun-darwin-arm64
            [windows-x64]=bun-windows-x64
          )
          for name in "${!targets[@]}"; do
            triple="${targets[$name]}"
            ext=""
            [[ "$name" == windows-* ]] && ext=".exe"
            bun build packages/server/src/binary.ts --compile --target="$triple" --outfile "dist-bin/tickets-$name$ext"
            bun build packages/tui/src/index.tsx --compile --target="$triple" --outfile "dist-bin/tickets-tui-$name$ext"
          done
          ls -la dist-bin

      - name: Publish to the GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" dist-bin/* --clobber
          else
            gh release create "$TAG" dist-bin/* --title "$TAG" --generate-notes
          fi
